services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/leiloes.db
    volumes:
      - backend_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  # Job de scraping (opcional: rodar em cron ou manual)
  scraper:
    build: ./backend
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/leiloes.db
    command: python -m app.scrapers.run_all
    profiles:
      - scrape

volumes:
  backend_data:
